<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecclesia Kenya — Catholic Parish Directory</title>
  <meta name="description" content="A public directory of Catholic parishes, cathedrals, basilicas and shrines across the dioceses of Kenya — Mass times, contacts, and locations on an interactive map." />
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-admin.css" />
</head>
<body>
  <div id="root"></div>

  <!-- Vendored libraries (self-hosted so the site has no CDN dependency;

  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script src="vendor/leaflet/leaflet.js"></script>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
